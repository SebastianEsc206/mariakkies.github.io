<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Merakiies - Carrito</title>
  
  <!-- CSS Principal y Tailwind -->
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/tailwind-output.css" />

  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind-theme.js"></script>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col pt-24 font-body-md antialiased">
  
  <!-- Contenedor del Header Inyectado -->
  <div id="header-container"></div>

  <!-- Contenido Principal: Carrito -->
  <main class="flex-1 max-w-[1280px] w-full mx-auto px-6 md:px-16 py-8">
    <div class="mb-8">
      <a href="/html/menu.html" class="text-on-surface-variant font-label-md hover:text-primary transition-colors flex items-center gap-1 inline-flex">
        <span class="material-symbols-outlined text-[18px]">chevron_left</span> Atras
      </a>
      <h1 class="font-display-sm text-display-sm text-on-background mt-4 uppercase tracking-wider">Tu carrito</h1>
    </div>

    <!-- Grid 2 Columnas -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
      
      <!-- Columna Izquierda: Lista de Productos -->
      <div class="lg:col-span-2 flex flex-col gap-8">
        
        <!-- Contenedor inyectado por JS -->
        <div id="cart-page-items" class="flex flex-col gap-6">
          <!-- Ejemplo estático de carga (será reemplazado) -->
          <p class="text-on-surface-variant">Cargando carrito...</p>
        </div>

        <!-- Acciones Inferiores -->
        <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-6 pt-6 border-t border-outline-variant/30">
          <div class="flex flex-col gap-2 w-full md:w-auto">
            <label class="text-on-surface-variant text-label-md">¿Tienes un cupón? Introduce tu código.</label>
            <div class="flex items-center gap-4">
              <input type="text" placeholder="Coupon code" class="bg-transparent border-b border-outline-variant/50 focus:border-primary px-2 py-1 outline-none text-on-surface w-48 transition-colors">
              <button class="px-6 py-2 border border-outline-variant/50 text-on-surface-variant hover:border-primary hover:text-primary transition-colors rounded-sm uppercase tracking-wider text-label-sm font-bold">Aplicar</button>
            </div>
          </div>
          <button id="btn-cart-update" class="text-on-surface-variant hover:text-primary transition-colors flex items-center gap-2 uppercase tracking-wider text-label-sm font-bold">
            <span class="material-symbols-outlined text-[18px]">sync</span> Actualizar carrito
          </button>
        </div>
      </div>

      <!-- Columna Derecha: Totales -->
      <div class="lg:col-span-1">
        <div class="bg-surface-container-low p-8 rounded-lg sticky top-32">
          <h2 class="font-headline-sm text-headline-sm text-on-background uppercase tracking-wider mb-6 pb-4 border-b border-outline-variant/30">Total</h2>
          
          <div class="flex flex-col gap-4 text-body-md text-on-surface-variant mb-6 pb-6 border-b border-outline-variant/30">
            <div class="flex justify-between items-center">
              <span>Envio (Local)</span>
              <span class="text-on-background">Gratis</span>
            </div>
            <div class="flex justify-between items-center">
              <span>Impuestos</span>
              <span class="text-on-background">$0.00</span>
            </div>
            <div class="flex justify-between items-center">
              <span>Subtotal</span>
              <span id="cart-page-subtotal" class="text-on-background">$0.00</span>
            </div>
          </div>

          <div class="flex justify-between items-center mb-8 font-headline-md text-headline-md text-on-background">
            <span>Total</span>
            <span id="cart-page-total">$0.00</span>
          </div>

          <button id="btn-cart-checkout" class="w-full bg-on-background text-background py-4 uppercase tracking-wider font-bold text-label-md hover:opacity-90 transition-opacity mb-4">
            Proceder con la compra
          </button>

          <div class="text-center">
            <a href="/html/menu.html" class="text-on-surface-variant font-label-md hover:text-primary transition-colors inline-flex items-center gap-1 uppercase tracking-wider text-label-sm">
              <span class="material-symbols-outlined text-[18px]">chevron_left</span> Seguir comprando
            </a>
          </div>
        </div>
      </div>
    </div>
  </main>
  <div id="footer-container"></div>
  <script src="/js/components.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
